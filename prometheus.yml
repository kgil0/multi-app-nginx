# Global Prometheus scraping configuration
global:
  scrape_interval: 5s

# External alerting rules
rule_files:
  - /etc/prometheus/alerts.yml

# Metrics collection targets
scrape_configs:

# Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

# Container-level metrics from Docker
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

# Host operating system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

# HTTPS uptime probing using Blackbox Exporter
  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://kgil0-monitor.duckdns.org

# Rewrite target labels for blackbox probing
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
      - targets:
        - alertmanager:9093


