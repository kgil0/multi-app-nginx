# Basic NGINX event configuration
events {}

# Main HTTP configuration
http {

# Rate limiting configuration for API protection
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;  

# Basic bad bot filtering based on User-Agent
  map $http_user_agent $bad_bot {
      default 0;

      ~*sqlmap 1;
      ~*nikto 1;
      ~*scanner 1;
      ~*curl 1;
  }

# Upstream backend pool with failover support
  upstream app_backend {
    server app1:80 max_fails=3 fail_timeout=10s;
    server app2:80 backup;
  }

# Redirect all HTTP traffic to HTTPS
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

# Main HTTPS reverse proxy server
  server {
    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/kgil0-monitor.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kgil0-monitor.duckdns.org/privkey.pem;

# Disable NGINX version disclosure
    server_tokens off;

    limit_req_status 429;

# Main application reverse proxy
    location / {

      if ($bad_bot) {
         return 403;
      }

      proxy_pass http://app_backend;

# Security headers
      add_header X-Backend $upstream_addr;

      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "no-referrer-when-downgrade" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

      limit_req zone=api_limit burst=10 nodelay;

    }

# API routing to dedicated backend service
    location /api/ {
      proxy_pass http://app3:80/;
    }
  }
}
