# Frontend application containers
services:
  app1:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app1:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  app2:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app2:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  app3:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app3:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

# Reverse proxy handling HTTPS traffic
  nginx:
    image: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app1
      - app2
      - app3

# Metrics collection and monitoring stack
  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana

# Container metrics exporter
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

# Host-level metrics exporter
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped

# Centralized log aggregation
  loki:
    image: grafana/loki:latest
    restart: unless-stopped

# Docker log shipping agent
  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml

# Alert routing service
  alertmanager:
    image: prom/alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

# HTTP/S uptime monitoring exporter
  blackbox:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped

volumes:
  grafana-data:
