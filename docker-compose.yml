services:
  app1:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app1:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  app1_2:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app1_2:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s


  app2:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app2:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs
      - ./logs:/var/log/nginx

    depends_on:
      - app1
      - app1_2
      - app2

  goaccess:
    image: allinurl/goaccess
    restart: unless-stopped

    ports:
      - "7889:7890"

    volumes:
      - ./logs:/var/log/nginx

    command: >
      /var/log/nginx/access.log
      --log-format=COMBINED
      -o /var/log/nginx/report.html
