services:
  app1:
    image: nginx
    restart: unless-stopped
    volumes: 
      - ./app1:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  app2:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app2:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  app3:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./app3:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "service nginx status >/dev/null 2>&1"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx
    restart: unless-stopped
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx
    depends_on:
      - app1
      - app2
      - app3
